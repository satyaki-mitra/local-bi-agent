[project]
# App name shown in the UI header
name = "LocalGenBI"

[UI]
# Custom theme — dark, data-warehouse aesthetic
name           = "LocalGenBI · Autonomous BI"
default_theme  = "dark"
hide_cot       = true
# Collapse the default Chainlit header chain-of-thought steps
show_readme_as_default = false

[UI.theme]
# ── Brand palette ──────────────────────────────────────
# Primary accent: electric teal  (#00D4AA)
# Surface dark:   deep navy      (#0D1117)
# Surface mid:    slate-900      (#161B22)
# Muted text:     cool-grey      (#8B949E)
# Border:         subtle steel   (#21262D)

[UI.theme.dark]
background    = "#0D1117"
paper         = "#161B22"

primary       = "#00D4AA"
primary_dark  = "#00A882"
secondary     = "#1F6FEB"
error         = "#F85149"
success       = "#3FB950"
warning       = "#D29922"
info          = "#58A6FF"

text_primary   = "#E6EDF3"
text_secondary = "#8B949E"
text_disabled  = "#484F58"

divider = "#21262D"

[UI.theme.light]
background    = "#F6F8FA"
paper         = "#FFFFFF"

primary       = "#0A6E5A"
primary_dark  = "#085445"
secondary     = "#0550AE"
error         = "#CF222E"
success       = "#116329"
warning       = "#7D4E00"
info          = "#0550AE"

text_primary   = "#1F2328"
text_secondary = "#636C76"
text_disabled  = "#9CA3AF"

divider = "#D0D7DE"

[meta]
generated_by = "LocalGenBI-Agent v1.0"